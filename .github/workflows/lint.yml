name: Lint & Test Desktop

# Hardening pass from Bug-Report-Go.md §2. Runs the cheap static analyses
# (vet, staticcheck, errcheck) and the race-aware test suite before any
# build job. These catch the same classes of bugs that drove the initial
# audit (unsynchronised state, ignored errors, goroutine leaks) at PR time
# instead of in production.

on:
  push:
    branches: [main, feature/cross-platform, saas-migration]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    # Pinned to 22.04 because this job installs libwebkit2gtk-4.0-dev
    # (24.04 only ships 4.1). See ubuntu-24-smoke below for the 4.1
    # counterpart.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: go.sum

      # Linux-only build deps. The lint job doesn't run wails build but
      # `go vet` needs to compile packages that import CGO-heavy libs
      # (GTK/webkit for Wails, libayatana for systray). xdotool /
      # xprintidle are no longer installed here — activity monitoring
      # now speaks X11 directly via jezek/xgb, so there are no runtime
      # subprocess dependencies on Linux.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev

      - name: go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: staticcheck
        run: staticcheck ./...

      - name: Install errcheck
        run: go install github.com/kisielk/errcheck@latest

      # errcheck catches ignored error returns (e.g. the pre-fix Logout
      # silently swallowing keyring delete errors — H-AUTH-3).
      - name: errcheck
        run: errcheck ./...

      # -race surfaces data races that compile clean but break in prod.
      # -count=1 disables test-result caching so this re-runs every push.
      - name: go test -race
        run: go test -race -count=1 ./...

  cross-compile:
    # Pinned to 22.04 for the same webkit2gtk-4.0 reason as
    # lint-and-test above.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: go.sum

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev

      # Catches platform-parity regressions (e.g. a function missing on
      # one OS — P-7 in the audit) without standing up macOS/Windows
      # runners. Darwin omitted because it needs CGO on a mac runner.
      - name: Cross-compile windows/amd64
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: "0"
        run: go build ./...

      - name: Cross-compile linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
        run: go build ./...

  # ═══ Ubuntu 24.04 smoke build ═══
  # Separate job because ubuntu-24.04 ships webkit2gtk 4.1 (not 4.0) and
  # needs the -tags webkit2_41 build flag. Catches two classes of
  # regression the 22.04 cross-compile above would miss:
  #   1. CGO symbol mismatches against the 4.1 headers (e.g. a Wails
  #      update dropping a 4.1-only symbol)
  #   2. Bugs in session_linux.go's Wayland detection that compile
  #      fine but break under the GNOME-on-Wayland default of 24.04
  ubuntu-24-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
          cache-dependency-path: go.sum

      - name: Install build dependencies (webkit2gtk 4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Build internal packages with webkit2_41 tag
        # The full wails build is done in release.yml on tag pushes.
        # Here we just want fast feedback on whether the Go packages
        # compile against 24.04's toolchain + headers.
        run: go build -tags webkit2_41 ./...

      - name: go vet (webkit2_41)
        run: go vet -tags webkit2_41 ./...
