name: Release Desktop App

on:
  push:
    tags:
      - 'v*' # Trigger on version tags: v1.0.0, v1.1.0, etc.

permissions:
  contents: write # Needed for creating GitHub Releases

env:
  APP_NAME: TaskFlowDesktop
  CGO_ENABLED: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ═══ Build Windows ═══
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install NSIS
        run: choco install nsis -y

      - name: Add NSIS to PATH
        shell: bash
        run: echo "C:/Program Files (x86)/NSIS" >> $GITHUB_PATH

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Windows binary
        shell: powershell
        run: |
          $pkg = "taskflow-desktop/internal/config"
          $version = "${{ steps.version.outputs.VERSION }}"
          $ldflags = @(
            "-X '${pkg}.apiURL=${{ secrets.API_URL }}'"
            "-X '${pkg}.cognitoRegion=${{ secrets.COGNITO_REGION }}'"
            "-X '${pkg}.cognitoPoolID=${{ secrets.COGNITO_POOL_ID }}'"
            "-X '${pkg}.cognitoClientID=${{ secrets.COGNITO_CLIENT_ID }}'"
            "-X '${pkg}.webDashboardURL=${{ secrets.WEB_DASHBOARD_URL }}'"
            "-X 'taskflow-desktop/internal/updater.CurrentVersion=${version}'"
          ) -join " "
          wails build -ldflags "$ldflags"

      - name: Build NSIS installer
        shell: powershell
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          cd build\windows\installer
          makensis /DPRODUCT_VERSION=$version project.nsi
          if (-not (Test-Path "TaskFlowDesktop-Setup-$version.exe")) {
            Write-Error "Installer not found: TaskFlowDesktop-Setup-$version.exe"
            exit 1
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/windows/installer/TaskFlowDesktop-Setup-*.exe

  # ═══ Build Linux ═══
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libwebkit2gtk-4.0-dev libgtk-3-dev \
            libayatana-appindicator3-dev libx11-dev libxtst-dev \
            libxkbcommon-dev libxcb-xkb-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Linux binary
        run: |
          PKG="taskflow-desktop/internal/config"
          VERSION="${{ steps.version.outputs.VERSION }}"
          LDFLAGS="-X '${PKG}.apiURL=${{ secrets.API_URL }}' \
            -X '${PKG}.cognitoRegion=${{ secrets.COGNITO_REGION }}' \
            -X '${PKG}.cognitoPoolID=${{ secrets.COGNITO_POOL_ID }}' \
            -X '${PKG}.cognitoClientID=${{ secrets.COGNITO_CLIENT_ID }}' \
            -X '${PKG}.webDashboardURL=${{ secrets.WEB_DASHBOARD_URL }}' \
            -X 'taskflow-desktop/internal/updater.CurrentVersion=${VERSION}'"
          wails build -ldflags "$LDFLAGS"

      - name: Create AppImage
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          mkdir -p TaskFlow.AppDir/usr/bin
          cp build/bin/taskflow-desktop TaskFlow.AppDir/usr/bin/
          cp build/appicon.png TaskFlow.AppDir/taskflow.png

          printf '%s\n' \
            '[Desktop Entry]' \
            'Name=TaskFlow Desktop' \
            'Exec=taskflow-desktop' \
            'Icon=taskflow' \
            'Type=Application' \
            'Categories=Office;ProjectManagement;' \
            'Comment=Time Tracker & Activity Monitor' \
            > TaskFlow.AppDir/taskflow-desktop.desktop

          printf '%s\n' \
            '#!/bin/bash' \
            'SELF=$(readlink -f "$0")' \
            'HERE=${SELF%/*}' \
            'exec "${HERE}/usr/bin/taskflow-desktop" "$@"' \
            > TaskFlow.AppDir/AppRun
          chmod +x TaskFlow.AppDir/AppRun

          # Download appimagetool
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run TaskFlow.AppDir "TaskFlow-${VERSION}-x86_64.AppImage"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: TaskFlow-*-x86_64.AppImage

  # ═══ Build Linux .deb (Ubuntu 24.04 / Debian 13+ — webkit2gtk 4.1) ═══
  # Separate from build-linux on purpose. The AppImage above is built
  # against webkit2gtk 4.0 on ubuntu-22.04 for max compatibility with
  # older distros; the .deb is built on ubuntu-24.04 against 4.1 so
  # users on Ubuntu 24.04 (GNOME Wayland by default) can install with a
  # single `sudo apt install ./taskflow-desktop_*.deb` and get proper
  # menu entries, auto-updates via apt, and clean uninstall.
  build-linux-deb:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install build dependencies (24.04 — webkit2gtk 4.1)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc pkg-config libgtk-3-dev \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev \
            libx11-dev libxtst-dev libxkbcommon-dev libxcb-xkb-dev

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build Linux binary (webkit2gtk 4.1)
        run: |
          PKG="taskflow-desktop/internal/config"
          VERSION="${{ steps.version.outputs.VERSION }}"
          LDFLAGS="-X '${PKG}.apiURL=${{ secrets.API_URL }}' \
            -X '${PKG}.cognitoRegion=${{ secrets.COGNITO_REGION }}' \
            -X '${PKG}.cognitoPoolID=${{ secrets.COGNITO_POOL_ID }}' \
            -X '${PKG}.cognitoClientID=${{ secrets.COGNITO_CLIENT_ID }}' \
            -X '${PKG}.webDashboardURL=${{ secrets.WEB_DASHBOARD_URL }}' \
            -X 'taskflow-desktop/internal/updater.CurrentVersion=${VERSION}'"
          wails build -tags webkit2_41 -ldflags "$LDFLAGS"

      - name: Stage .deb tree
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKGROOT="deb-root"
          rm -rf "$PKGROOT"
          mkdir -p "$PKGROOT/DEBIAN"
          mkdir -p "$PKGROOT/usr/bin"
          mkdir -p "$PKGROOT/usr/share/applications"
          mkdir -p "$PKGROOT/usr/share/icons/hicolor/512x512/apps"

          install -m 0755 build/bin/taskflow-desktop "$PKGROOT/usr/bin/taskflow-desktop"
          install -m 0644 build/appicon.png "$PKGROOT/usr/share/icons/hicolor/512x512/apps/taskflow-desktop.png"

          # Desktop entry. StartupWMClass must match the window class so
          # GNOME/KDE correctly group the running window with the launcher
          # icon instead of showing a second generic entry.
          cat > "$PKGROOT/usr/share/applications/taskflow-desktop.desktop" <<'DESKTOP'
          [Desktop Entry]
          Name=TaskFlow Desktop
          Exec=taskflow-desktop
          Icon=taskflow-desktop
          Type=Application
          Categories=Office;ProjectManagement;
          Comment=Time Tracker & Activity Monitor
          Terminal=false
          StartupWMClass=taskflow-desktop
          DESKTOP

          # Installed-size in KiB is required for apt to show progress.
          INSTALLED_SIZE=$(du -sk --exclude=DEBIAN "$PKGROOT" | cut -f1)

          # Runtime deps: webkit2gtk 4.1 (24.04+), gtk3, appindicator.
          # We deliberately do NOT declare xdotool / xprintidle /
          # libnotify-bin — after Phase 1 the app talks X11 and D-Bus
          # directly, so no runtime subprocess deps remain.
          cat > "$PKGROOT/DEBIAN/control" <<CONTROL
          Package: taskflow-desktop
          Version: ${VERSION}
          Architecture: amd64
          Maintainer: NeuroStack <support@neurostack.in>
          Installed-Size: ${INSTALLED_SIZE}
          Depends: libwebkit2gtk-4.1-0, libgtk-3-0, libayatana-appindicator3-1, libc6 (>= 2.35)
          Section: utils
          Priority: optional
          Homepage: https://taskflow-ns.vercel.app
          Description: TaskFlow time tracker and activity monitor
           Cross-platform desktop client for TaskFlow: starts and stops
           timers, tracks per-app activity, syncs with the TaskFlow
           cloud backend, and posts desktop notifications. Supports
           Ubuntu 24.04 and newer distros shipping webkit2gtk 4.1.
          CONTROL

      - name: Build .deb
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # dpkg-deb requires the output path NOT already exist.
          OUT="taskflow-desktop_${VERSION}_amd64.deb"
          dpkg-deb --build --root-owner-group deb-root "$OUT"
          dpkg-deb --info "$OUT"
          dpkg-deb --contents "$OUT" | head -40

      - name: Upload Linux .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-build
          path: taskflow-desktop_*_amd64.deb

  # ═══ Build macOS ═══
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build macOS binary (universal)
        run: |
          PKG="taskflow-desktop/internal/config"
          VERSION="${{ steps.version.outputs.VERSION }}"
          LDFLAGS="-X '${PKG}.apiURL=${{ secrets.API_URL }}' \
            -X '${PKG}.cognitoRegion=${{ secrets.COGNITO_REGION }}' \
            -X '${PKG}.cognitoPoolID=${{ secrets.COGNITO_POOL_ID }}' \
            -X '${PKG}.cognitoClientID=${{ secrets.COGNITO_CLIENT_ID }}' \
            -X '${PKG}.webDashboardURL=${{ secrets.WEB_DASHBOARD_URL }}' \
            -X 'taskflow-desktop/internal/updater.CurrentVersion=${VERSION}'"
          wails build -platform darwin/universal -ldflags "$LDFLAGS"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          brew install create-dmg
          create-dmg \
            --volname "TaskFlow Desktop" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --app-drop-link 400 200 \
            --icon "TaskFlow Desktop.app" 200 200 \
            "TaskFlowDesktop-${VERSION}-universal.dmg" \
            "build/bin/" || true
          # create-dmg returns non-zero even on success sometimes — verify the file exists instead
          if [ ! -f "TaskFlowDesktop-${VERSION}-universal.dmg" ]; then
            echo "ERROR: DMG was not produced"
            exit 1
          fi

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: TaskFlowDesktop-*-universal.dmg

  # ═══ Create Release + Upload to S3 ═══
  release:
    needs: [build-windows, build-linux, build-linux-deb, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Collect release files
        run: |
          mkdir -p release-files
          find artifacts/ -name "*.exe" -exec cp {} release-files/ \;
          find artifacts/ -name "*.AppImage" -exec cp {} release-files/ \;
          find artifacts/ -name "*.deb" -exec cp {} release-files/ \;
          find artifacts/ -name "*.dmg" -exec cp {} release-files/ \;
          echo "=== Release files ==="
          ls -la release-files/

      - name: Generate SHA256SUMS
        # Required by the in-app updater (see internal/updater/updater.go):
        # without this file, the updater will refuse to install the release.
        run: |
          cd release-files
          sha256sum * > SHA256SUMS
          echo "=== SHA256SUMS ==="
          cat SHA256SUMS

      # ═══ Sign SHA256SUMS (optional — see V2-H1) ═══
      # Activates once the release signing key is generated and stored:
      #   1. Generate keypair with: `ssh-keygen -t ed25519 -N "" -f release_key`
      #      (or any Ed25519 generator). The public key in release_key.pub
      #      goes into desktop/internal/updater/release.pub (base64 of
      #      raw 32-byte key — strip any "ssh-ed25519 " prefix and base64
      #      the key material).
      #   2. Store the PRIVATE key as the GH secret RELEASE_SIGNING_KEY_B64
      #      (base64 of the raw 32-byte seed).
      #   3. Uncomment the block below + commit the pubkey change.
      # Until then, releases ship unsigned and the updater warns in logs
      # but continues.
      #
      # - name: Sign SHA256SUMS
      #   env:
      #     KEY_B64: ${{ secrets.RELEASE_SIGNING_KEY_B64 }}
      #   run: |
      #     set -e
      #     if [ -z "$KEY_B64" ]; then
      #       echo "RELEASE_SIGNING_KEY_B64 not set — cannot sign"
      #       exit 1
      #     fi
      #     python3 - <<'PY'
      #     import base64, os, sys
      #     from nacl.signing import SigningKey
      #     seed = base64.b64decode(os.environ["KEY_B64"])
      #     key = SigningKey(seed)
      #     body = open("release-files/SHA256SUMS", "rb").read()
      #     sig = key.sign(body).signature
      #     open("release-files/SHA256SUMS.sig", "wb").write(base64.b64encode(sig))
      #     PY

      - name: Verify SHA256SUMS covers every release artifact
        # Belt-and-braces guard against a release-workflow slip-up that
        # lists a file in the release but omits it from SHA256SUMS —
        # such a release would silently block every user's auto-update
        # with a cryptic "no checksum entry" error. See V2-H3.
        run: |
          cd release-files
          set -e
          missing=0
          for f in *; do
            if [ "$f" = "SHA256SUMS" ]; then continue; fi
            if ! grep -qi " [*]\\?${f}\$" SHA256SUMS; then
              echo "MISSING: $f not found in SHA256SUMS"
              missing=1
            fi
          done
          if [ "$missing" != "0" ]; then
            echo "FAIL: one or more release artifacts are missing from SHA256SUMS"
            exit 1
          fi
          echo "OK: all release artifacts accounted for in SHA256SUMS"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.VERSION }}"
          body: |
            ## TaskFlow Desktop v${{ steps.version.outputs.VERSION }}

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows | `TaskFlowDesktop-Setup-${{ steps.version.outputs.VERSION }}.exe` |
            | Ubuntu 24.04+ / Debian 13+ (`.deb`) | `taskflow-desktop_${{ steps.version.outputs.VERSION }}_amd64.deb` |
            | Other Linux (AppImage) | `TaskFlow-${{ steps.version.outputs.VERSION }}-x86_64.AppImage` |
            | macOS | `TaskFlowDesktop-${{ steps.version.outputs.VERSION }}-universal.dmg` |

            ### Linux install

            ```bash
            # Ubuntu 24.04+ / Debian 13+
            sudo apt install ./taskflow-desktop_${{ steps.version.outputs.VERSION }}_amd64.deb

            # Other distros
            chmod +x TaskFlow-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
            ./TaskFlow-${{ steps.version.outputs.VERSION }}-x86_64.AppImage
            ```

            ### What's New
            See commit history for changes.
          files: release-files/*
          draft: false
          prerelease: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Upload to S3
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          S3_BUCKET="taskflow-ns-uploads-prod"
          S3_PREFIX="releases/v${VERSION}"

          # Upload all platform builds (files already collected in release-files/)
          aws s3 cp release-files/ "s3://${S3_BUCKET}/${S3_PREFIX}/" --recursive

          # Create latest.json for website download page
          cat > /tmp/latest.json << EOF
          {
            "version": "${VERSION}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "downloads": {
              "windows": "https://dp2uotzxlo5a5.cloudfront.net/${S3_PREFIX}/TaskFlowDesktop-Setup-${VERSION}.exe",
              "linux": "https://dp2uotzxlo5a5.cloudfront.net/${S3_PREFIX}/TaskFlow-${VERSION}-x86_64.AppImage",
              "linux_deb": "https://dp2uotzxlo5a5.cloudfront.net/${S3_PREFIX}/taskflow-desktop_${VERSION}_amd64.deb",
              "macos": "https://dp2uotzxlo5a5.cloudfront.net/${S3_PREFIX}/TaskFlowDesktop-${VERSION}-universal.dmg"
            },
            "github_release": "https://github.com/Giridharan0624/taskflow-desktop/releases/tag/v${VERSION}"
          }
          EOF

          aws s3 cp /tmp/latest.json "s3://${S3_BUCKET}/releases/latest.json" \
            --content-type "application/json" \
            --cache-control "no-cache, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache for latest.json
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/releases/latest.json"

      - name: Print release URLs
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          S3_PREFIX="releases/v${VERSION}"
          echo "=== Uploaded to S3 ==="
          echo "Windows: https://dp2uotzxlo5a5.cloudfront.net/${S3_PREFIX}/TaskFlowDesktop-Setup-${VERSION}.exe"
          echo "Linux: https://dp2uotzxlo5a5.cloudfront.net/${S3_PREFIX}/TaskFlow-${VERSION}-x86_64.AppImage"
          echo "macOS: https://dp2uotzxlo5a5.cloudfront.net/${S3_PREFIX}/TaskFlowDesktop-${VERSION}-universal.dmg"
          echo "Latest: https://dp2uotzxlo5a5.cloudfront.net/releases/latest.json"
