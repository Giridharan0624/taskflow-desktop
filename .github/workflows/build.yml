name: Build Desktop App

on:
  push:
    branches: [main, feature/cross-platform]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: taskflow-desktop.exe
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: taskflow-desktop
          - os: macos-latest
            platform: darwin/universal
            artifact: taskflow-desktop

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # xdotool / xprintidle are no longer runtime dependencies —
      # activity monitoring talks X11 directly through jezek/xgb, and
      # notifications go over the org.freedesktop.Notifications D-Bus
      # service instead of shelling out to notify-send. The only apt
      # packages still required are the CGO build-time deps.
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: desktop
        shell: powershell
        run: |
          $pkg = "taskflow-desktop/internal/config"
          $ldflags = @(
            "-X '${pkg}.apiURL=${{ secrets.API_URL }}'"
            "-X '${pkg}.cognitoRegion=${{ secrets.COGNITO_REGION }}'"
            "-X '${pkg}.cognitoPoolID=${{ secrets.COGNITO_POOL_ID }}'"
            "-X '${pkg}.cognitoClientID=${{ secrets.COGNITO_CLIENT_ID }}'"
            "-X '${pkg}.webDashboardURL=${{ secrets.WEB_DASHBOARD_URL }}'"
            "-X 'taskflow-desktop/internal/updater.CurrentVersion=ci'"
          ) -join " "
          wails build -platform ${{ matrix.platform }} -ldflags "$ldflags"

      - name: Build (Unix)
        if: matrix.os != 'windows-latest'
        working-directory: desktop
        shell: bash
        run: |
          PKG="taskflow-desktop/internal/config"
          LDFLAGS="-X '${PKG}.apiURL=${{ secrets.API_URL }}' \
            -X '${PKG}.cognitoRegion=${{ secrets.COGNITO_REGION }}' \
            -X '${PKG}.cognitoPoolID=${{ secrets.COGNITO_POOL_ID }}' \
            -X '${PKG}.cognitoClientID=${{ secrets.COGNITO_CLIENT_ID }}' \
            -X '${PKG}.webDashboardURL=${{ secrets.WEB_DASHBOARD_URL }}' \
            -X 'taskflow-desktop/internal/updater.CurrentVersion=ci'"
          wails build -platform ${{ matrix.platform }} -ldflags "$LDFLAGS"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-desktop-${{ matrix.os }}
          path: desktop/build/bin/${{ matrix.artifact }}
