name: Build Desktop App

on:
  push:
    branches: [main, feature/cross-platform]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows/amd64
            artifact: taskflow-desktop.exe
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: taskflow-desktop
          - os: macos-latest
            platform: darwin/universal
            artifact: taskflow-desktop

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc libgtk-3-dev libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev xdotool xprintidle

      - name: Build
        working-directory: desktop
        run: wails build -platform ${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: taskflow-desktop-${{ matrix.os }}
          path: desktop/build/bin/${{ matrix.artifact }}
